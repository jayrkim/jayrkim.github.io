<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>김재록 | 金載綠 | Jae Rok Kim</title>

<style>
:root{
  --bg:#0b0e14;
  --card:rgba(255,255,255,0.06);
  --card2:rgba(255,255,255,0.08);
  --text:rgba(255,255,255,0.92);
  --muted:rgba(255,255,255,0.65);
  --line:rgba(255,255,255,0.14);
  --shadow:rgba(0,0,0,0.35);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
  background:
    radial-gradient(1200px 600px at 20% 0%, rgba(255,255,255,0.10), transparent 60%),
    radial-gradient(900px 500px at 80% 10%, rgba(255,255,255,0.08), transparent 55%),
    var(--bg);
  color:var(--text);
  line-height:1.65;
}
.wrap{max-width:980px; margin:0 auto; padding:56px 18px 72px}

.hero{
  display:flex;
  align-items:center;
  gap:40px;
  padding:40px;
  border:1px solid var(--line);
  border-radius:20px;
  background:linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
  box-shadow:0 18px 60px var(--shadow);
}
@media (max-width:860px){
  .hero{flex-direction:column; text-align:center;}
}

.profile-img{
  width:240px;
  height:300px;
  border-radius:20px;  /* 50% 제거 */
  object-fit:cover;
}

.name{margin:0; font-size:36px; letter-spacing:-0.02em}
.alt{margin-top:6px; color:var(--muted); font-size:14px}

.tags{margin-top:18px; display:flex; flex-wrap:wrap; gap:10px}
.tag{
  padding:6px 10px;
  border:1px solid var(--line);
  border-radius:999px;
  background:rgba(255,255,255,0.05);
  font-size:13px;
}

.footer{
  margin-top:40px;
  text-align:center;
  color:rgba(255,255,255,0.5);
  font-size:12px;
}
</style>
</head>

<body>
<main class="wrap">

  <!-- HERO -->
  <section class="hero">

    <!-- 🔥 여기 사진 경로 -->
    <img src="0A3306E2-D25E-4BEE-ACA9-1068097E368C.PNG" alt="김재록 프로필 사진" class="profile-img">

    <div>
      <h1 class="name">김재록</h1>
      <div class="alt">金載綠 · JAEROK KIM</div>

      <div class="tags">
        <span class="tag">작가</span>
        <span class="tag">번역가</span>
        <span class="tag">범죄심리사</span>
        <span class="tag">민주평화통일자문회의 자문위원</span>
        <span class="tag">법심리학 연구자</span>
        <span class="tag">심리학 학사</span>
        <span class="tag">심리학 석사</span>
        <span class="tag">철학 석사</span>
        <span class="tag">쓰리디엠 주식회사 대표이사</span>
                <span class="tag">멘사코리아 회원</span>
        <span class="tag">대한민국 해병대 병장 만기전역</span>
      </div>
    </div>

  </section>

  <div class="footer">
    © 2026 JAEROKKIM. All rights reserved.
  </div>

</main>
</body>
</html>
